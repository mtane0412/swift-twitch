# .swiftlint.yml
# TwitchChat プロジェクト用 SwiftLint 設定
# Swift 6.0 / Swift Testing / macOS 15+ 向け

included:
  - Sources
  - Tests

excluded:
  - .build

# 有効化するオプトインルール
opt_in_rules:
  - empty_count
  - closure_spacing
  - modifier_order
  - sorted_imports
  - unneeded_parentheses_in_closure_argument
  - first_where                            # .filter { }.first より .first(where:) を推奨
  - redundant_nil_coalescing              # ?? nil は冗長
  - implicit_return                        # クロージャの単一式は return を省略
  - vertical_parameter_alignment_on_call  # 複数行呼び出しの引数縦揃え

# 無効化するルール
disabled_rules:
  # Swift Testing の #expect マクロで誤検知するため
  - trailing_closure

# 行の長さ（初回導入のため緩めに設定）
line_length:
  warning: 150
  error: 200
  ignores_comments: true
  ignores_urls: true

# 型の本体の長さ
type_body_length:
  warning: 300
  error: 500

# ファイルの長さ
file_length:
  warning: 500
  error: 1000

# 関数の本体の長さ
function_body_length:
  warning: 50
  error: 100

# 識別子の名前（短すぎる変数名への警告を緩和）
identifier_name:
  min_length:
    warning: 2
    error: 1
  excluded:
    - id
    - ok
    - to
